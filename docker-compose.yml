services:
  postgres:
    image: postgres:16-alpine
    container_name: pendenciasmanager-postgres
    environment:
      POSTGRES_DB: pendenciasmanager
      POSTGRES_USER: pendencias
      POSTGRES_PASSWORD: pendencias123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pendencias -d pendenciasmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pendenciasmanager-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pendenciasmanager
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: pendencias
      SPRING_DATASOURCE_PASSWORD: pendencias123
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: "false"
      SECURITY_JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SECURITY_JWT_EXPIRATION: 3600000
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
